<body>
    <div>

        <h1>Etiquetagem git</h1>

        <p>
            Criar uma Tag Anotada ( -a -m)<br>

            Uma etiqueta anotada armazena seu nome, a data e uma mensagem.<br>

            Isso é recomendado para a maioria dos usos.<br>

            Exemplo
            git tag -a v1.0 -m "Version 1.0 release"</p><br>
